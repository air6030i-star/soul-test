  const [mbtiType, setMbtiType] = useState(
    () => localStorage.getItem("soul_mbtiType") || null
  );
  const [subtype, setSubtype] = useState(
    () => localStorage.getItem("soul_subtype") || null
  );
  const [ans, setAns] = useState([]);
  const [subAns, setSubAns] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [subQIdx, setSubQIdx] = useState(0);
  const [testPhase, setTestPhase] = useState("mbti"); // mbti | subtype
  const [paid, setPaid] = useState(
    () => localStorage.getItem("soul_paid") === "true"
  );
  const [subscribed, setSubscribed] = useState(
    () => localStorage.getItem("soul_subscribed") === "true"
  );
  const [p1, setP1] = useState(""); const [p2, setP2] = useState("");
  const [p1sub, setP1sub] = useState("OH"); const [p2sub, setP2sub] = useState("OH");
  const [compatDone, setCompatDone] = useState(false);
  const [tab, setTab] = useState("daily");
  const [count] = useState(43891+Math.floor(Math.random()*80));

  useEffect(() => {
    if (mbtiType) localStorage.setItem("soul_mbtiType", mbtiType);
    if (subtype) localStorage.setItem("soul_subtype", subtype);
    localStorage.setItem("soul_paid", paid);
    localStorage.setItem("soul_subscribed", subscribed);
  }, [mbtiType, subtype, paid, subscribed]);

  const resetAll = () => {
    localStorage.removeItem("soul_mbtiType");
    localStorage.removeItem("soul_subtype");
    localStorage.removeItem("soul_paid");
    localStorage.removeItem("soul_subscribed");
    setMbtiType(null);
    setSubtype(null);
    setPaid(false);
    setSubscribed(false);
    setPage("home");
  };

  const di = getDayIdx();

  const S = mbtiType ? SOULS[mbtiType] : null;
  const ST = S && subtype ? S.subtypes[subtype] : null;
  const base = {background:"#070510",minHeight:"100vh",color:"white",fontFamily:"'Georgia',serif",position:"relative"};
  const W = {maxWidth:440,margin:"0 auto",padding:"0 18px",position:"relative",zIndex:1};
  const C = (ex={}) => ({background:"rgba(255,255,255,0.04)",backdropFilter:"blur(18px)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:22,marginBottom:14,transition:"all 0.25s",...ex});
  const B = (bg,ex={}) => ({width:"100%",padding:"14px 18px",background:bg,color:"white",border:"none",borderRadius:14,fontSize:17,fontWeight:700,cursor:"pointer",marginBottom:10,letterSpacing:"0.4px",transition:"all 0.2s",minHeight:50,...ex});

  const TypeChip = ({type, st, size="sm"}) => {
    const si = SOULS[type];
    const fs = size==="lg" ? {outer:{padding:"8px 18px"},code:{fontSize:23},name:{fontSize:16}} : {outer:{padding:"4px 12px"},code:{fontSize:16},name:{fontSize:14}};

      <span style={{display:"inline-flex",alignItems:"center",gap:6,background:`${si.glow}22`,border:`1px solid ${si.color}44`,borderRadius:20,...fs.outer}}>

        <span style={{width:1,height:12,background:`${si.color}44`}}/>
        <span style={{fontSize:fs.name.fontSize,color:"rgba(255,255,255,0.55)"}}>{si.emoji} {si.name}</span>

  };

  // ── HOME ──────────────────────────────────────────────────────────────────────
  if(page==="home") return (
    <div style={base}><BG/>
      <div style={W}>
        <div style={{textAlign:"center",padding:"52px 0 24px",animation:"fu 0.7s ease both"}}>

          <div style={{fontSize:60,marginBottom:4}}>🔮</div>
          <h1 style={{fontSize:32,fontWeight:900,margin:"0 0 6px",lineHeight:1.2}}><span className="sh">靈魂人格測驗</span></h1>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:15,lineHeight:1.8,margin:"8px 0 0"}}>探索你的靈魂密碼 · 64型進階人格系統<br/>每天一則成長語錄 + 靈魂指引</p>

          <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:14,fontSize:13,color:"rgba(255,255,255,0.3)"}}>

          </div>
          <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:12,marginBottom:8,borderLeft:"2px solid #3B82F6"}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:4,letterSpacing:1}}>🌙 今日靈語</div>
            <p style={{margin:0,fontSize:16,lineHeight:1.7,color:"rgba(255,255,255,0.7)",fontStyle:"italic"}}>「{SOULS["INFJ"].subtypes.OH.daily[di]}」</p>
          </div>
          <div style={{background:"rgba(0,0,0,0.15)",borderRadius:10,padding:12}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:4,letterSpacing:1}}>🌱 今日成長語錄</div>
            <p style={{margin:0,fontSize:15,lineHeight:1.7,color:"rgba(255,255,255,0.55)"}}>{SOULS["INFJ"].subtypes.OH.growth[di]}</p>
          </div>
          <p style={{margin:"8px 0 0",fontSize:13,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>完成測驗，解鎖你的專屬 64型靈魂密碼 ↓</p>
        </div>

        {/* CTAs */}
        <div style={{animation:"fu 0.7s 0.2s ease both"}}>
          <button onClick={()=>{setPage("test");setQIdx(0);setAns([]);setSubAns([]);setTestPhase("mbti");}} className="bh" style={B("linear-gradient(135deg,#8B7CF6,#6C63FF)")}>✨ 免費探索我的64型靈魂密碼</button>
              {mbtiType && <button onClick={resetAll} className="bh" style={B("rgba(255,255,255,0.06)",{marginTop:8,fontSize:14,color:"rgba(255,255,255,0.35)"})}>↺ 重新測驗</button>}
          {mbtiType && subtype && <button onClick={()=>setPage("daily")} className="bh" style={B("linear-gradient(135deg,#F472B6,#E879A0)")}>🌙 今日靈語中心</button>}
          <button onClick={()=>setPage("compat")} className="bh" style={B("rgba(255,255,255,0.05)",{border:"1px solid rgba(255,255,255,0.1)"})}>💕 靈魂配對分析</button>
          <button onClick={()=>setPage("sub")} className="bh" style={B("rgba(255,255,255,0.05)",{border:"1px solid rgba(255,255,255,0.1)"})}>🌟 訂閱每日靈語 + 成長語錄</button>
        </div>

        {/* Features */}
        <div style={{paddingBottom:40,animation:"fu 0.7s 0.3s ease both"}}>
          <p style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:13,marginBottom:12,letterSpacing:1}}>✦ 每天都有新的內容等著你 ✦</p>
          {[{icon:"🔬",t:"64型進階人格系統",d:"16型 × A/O/H/C 四維度，更精準描述你是誰"},{icon:"🌙",t:"今日靈語",d:"根據你的型號，每天不同的宇宙指引"},{icon:"🌱",t:"每日成長語錄",d:"針對你人格特質量身定制的成長方向"},{icon:"🃏",t:"每日塔羅指引",d:"你今天的塔羅訊息，結合人格深度解讀"},{icon:"💕",t:"靈魂配對深讀",d:"兩人64型代碼的宇宙緣分與溝通密碼"},].map((f,i)=>(
            <div key={i} className="gh" style={{...C(),display:"flex",gap:12,alignItems:"flex-start",animation:`fu 0.5s ${0.35+i*0.07}s ease both`}}>
              <div style={{fontSize:26,flexShrink:0}}>{f.icon}</div>
              <div><div style={{fontWeight:700,marginBottom:3,fontSize:16}}>{f.t}</div><div style={{color:"rgba(255,255,255,0.4)",fontSize:14,lineHeight:1.6}}>{f.d}</div></div>
            </div>
          ))}
        </div>
        <p style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:13,paddingBottom:40}}>👥 {count.toLocaleString()} 個靈魂 · ⭐ 4.9 分 · 🔄 每日更新</p>
      </div>
    </div>
  );

  // ── TEST ──────────────────────────────────────────────────────────────────────
  if(page==="test") {
    const isSubPhase = testPhase==="subtype";
    const curQ = isSubPhase ? SUBTYPE_Q[subQIdx] : QUESTIONS[qIdx];
    const total = isSubPhase ? SUBTYPE_Q.length : QUESTIONS.length;
    const cur = isSubPhase ? subQIdx : qIdx;
    const phase2color = isSubPhase ? "#F472B6" : "#8B7CF6";

    const handleAns = (idx) => {
      if(!isSubPhase) {
        const na=[...ans,idx]; setAns(na);
        if(qIdx<QUESTIONS.length-1){ setQIdx(qIdx+1); }
        else { setMbtiType(calcType(na)); setTestPhase("subtype"); setSubQIdx(0); setSubAns([]); }
      } else {
        const nsa=[...subAns,idx]; setSubAns(nsa);
        if(subQIdx<SUBTYPE_Q.length-1){ setSubQIdx(subQIdx+1); }
        else { setSubtype(calcSubtype(nsa)); setPage("result"); }
      }
    };

    return (
      <div style={base}><BG/>
        <div style={W}>
          <div style={{padding:"32px 0",animation:"fu 0.5s ease both"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <button onClick={()=>setPage("home")} style={{background:"rgba(255,255,255,0.07)",border:"none",color:"white",padding:"6px 12px",borderRadius:10,cursor:"pointer",fontSize:15}}>←</button>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13,color:"rgba(255,255,255,0.35)"}}>
                  <span>{isSubPhase?"進階探索：行為風格":"靈魂探索：人格類型"}</span>
                  <span>{cur+1}/{total}</span>
                </div>
                <div style={{background:"rgba(255,255,255,0.07)",borderRadius:8,height:3}}>
                  <div style={{background:`linear-gradient(90deg,${phase2color},${isSubPhase?"#8B7CF6":"#F472B6"})`,borderRadius:8,height:3,width:`${((cur+1)/total)*100}%`,transition:"width 0.4s"}}/>
                </div>
                {isSubPhase && mbtiType && <div style={{marginTop:6}}><TypeChip type={mbtiType} size="sm"/></div>}
              </div>
            </div>
            <div style={C({padding:26})}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:`rgba(${isSubPhase?"244,114,182":"139,124,246"},0.15)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,margin:"0 auto 12px",border:`1px solid rgba(${isSubPhase?"244,114,182":"139,124,246"},0.25)`}}>
                  {isSubPhase?"🔬":"🔮"}
                </div>
                <p style={{color:"rgba(255,255,255,0.3)",fontSize:13,margin:"0 0 8px",letterSpacing:1}}>{isSubPhase?"探索你的行為風格":"誠實地聆聽你的靈魂"}</p>
                <h2 style={{fontSize:20,fontWeight:700,lineHeight:1.55,margin:0}}>{curQ.q}</h2>
              </div>
              {curQ.a.map((a,i)=>(
                <button key={i} className="gh" onClick={()=>handleAns(i)} style={{width:"100%",padding:"15px 16px",background:["rgba(139,124,246,0.1)","rgba(244,114,182,0.1)"][i],border:`1px solid ${["rgba(139,124,246,0.25)","rgba(244,114,182,0.25)"][i]}`,borderRadius:13,fontSize:16,cursor:"pointer",marginBottom:10,textAlign:"left",color:"white",lineHeight:1.6,transition:"all 0.2s",minHeight:56}}>
                  <span style={{opacity:0.4,marginRight:8,fontSize:13}}>{"①②"[i]}</span>{a}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── RESULT ────────────────────────────────────────────────────────────────────
  if(page==="result" && mbtiType && subtype && S && ST) {
    return (
      <div style={{...base,background:`radial-gradient(ellipse at top,${S.glow}1a 0%,#070510 55%)`}}><BG/>
        <div style={W}>
          <div style={{padding:"32px 0",animation:"fu 0.6s ease both"}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:66,filter:`drop-shadow(0 0 16px ${S.glow})`,marginBottom:10}}>{S.emoji}</div>
              <TypeChip type={mbtiType} st={subtype} size="lg"/>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:14,marginTop:8}}>{S.en} · {ST.nick}</div>
              <div style={{display:"inline-block",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"3px 12px",fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:6}}>
                全球約 {ST.rare} 的靈魂
              </div>
            </div>

            {/* Core desc */}
            <div style={{...C(),border:`1px solid ${S.color}22`,background:`${S.glow}08`,marginBottom:12}}>
              <p style={{margin:0,fontSize:16,lineHeight:1.8,color:"rgba(255,255,255,0.75)",textAlign:"center",fontStyle:"italic"}}>「{ST.desc}」</p>
            </div>

            {/* Today 2-col */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div style={{...C({padding:14}),border:`1px solid ${S.color}18`}}>
                <div style={{fontSize:12,color:S.color,marginBottom:6,letterSpacing:1}}>🌙 今日靈語</div>
                <p style={{margin:0,fontSize:15,lineHeight:1.7,fontStyle:"italic",color:"rgba(255,255,255,0.7)"}}>「{ST.daily[di]}」</p>
              </div>
              <div style={{...C({padding:14}),border:`1px solid ${S.color}18`}}>
                <div style={{fontSize:12,color:S.color,marginBottom:6,letterSpacing:1}}>🌱 今日成長</div>
                <p style={{margin:0,fontSize:15,lineHeight:1.7,color:"rgba(255,255,255,0.55)"}}>{ST.growth[di]}</p>
              </div>
            </div>

            {/* Affirmation */}
            <div style={{...C({textAlign:"center"}),border:`1px solid ${S.color}18`,marginBottom:12}}>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:8,letterSpacing:1}}>✦ 今日靈魂宣言 ✦</div>
              <p style={{margin:0,fontSize:17,color:S.color,fontStyle:"italic",fontWeight:600,lineHeight:1.7}}>「{ST.affirmation[di%3]}」</p>
            </div>

            {/* Subtype info */}
            <div style={{...C(),marginBottom:12}}>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:10,letterSpacing:1}}>🔬 你的64型代碼</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(SUBTYPE_LABELS).map(([k,label])=>(
                  <div key={k} style={{background:k===subtype?`${S.color}18`:"rgba(255,255,255,0.03)",border:`1px solid ${k===subtype?S.color+"44":"rgba(255,255,255,0.06)"}`,borderRadius:10,padding:"10px 12px"}}>
                    <div style={{fontSize:13,fontFamily:"monospace",color:k===subtype?S.color:"rgba(255,255,255,0.35)",fontWeight:k===subtype?700:400,marginBottom:3}}>{mbtiType}-{k.slice(0,1)}-{k.slice(1)} {k===subtype?"← 你":""}</div>
                    <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>{SUBTYPE_DESC[k]}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Deep report */}
            {!paid?(
              <div style={{...C(),border:`1px dashed ${S.color}33`}}>
                <div style={{textAlign:"center",marginBottom:12}}>
                  <div style={{fontSize:28,marginBottom:6}}>🔮</div>
                  <h3 style={{margin:"0 0 3px",fontSize:17}}>解鎖 {mbtiType}-{subtype.slice(0,1)}-{subtype.slice(1)} 完整靈魂密碼</h3>
                  <p style={{color:"rgba(255,255,255,0.35)",fontSize:14,margin:0}}>愛情 · 事業 · 財運 · 靈魂伴侶 · 塔羅 · 2026運勢</p>
                </div>
                <div style={{background:"rgba(0,0,0,0.15)",borderRadius:10,padding:12,marginBottom:10}}>
                  {["💕 靈魂伴侶完整配對","💼 天命事業路徑","💰 本年財運預測","🌟 靈魂三大成長課題","🔮 年度宇宙能量","🎨 你的幸運色彩系統"].map(f=>(
                    <div key={f} style={{color:"rgba(255,255,255,0.5)",fontSize:14,marginBottom:5,display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:3,height:3,borderRadius:"50%",background:S.color,flexShrink:0}}/>{f}
                    </div>
                  ))}
                </div>
                <button onClick={()=>setPaid(true)} className="bh" style={B(`linear-gradient(135deg,${S.color},${S.glow})`,{marginBottom:4})}>✨ NT$99 解鎖完整靈魂密碼</button>
                <p style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:13,margin:0}}>一次解鎖 · 永久珍藏</p>
              </div>
            ):(
              <div style={C()}>
                <h3 style={{margin:"0 0 12px",color:S.color,fontSize:16}}>🌟 {mbtiType}-{subtype.slice(0,1)}-{subtype.slice(1)} 完整靈魂密碼</h3>
                {[{icon:"💕",t:"靈魂伴侶",c:`你在感情中展現${ST.nick}的特質。你的元素是${S.element}，與${S.planet}能量共振，注定與特定靈魂有深層的宇宙牽引。`},{icon:"💼",t:"天命事業",c:`${S.sub}的天命是在${S.element}的能量領域建立影響力。今年是你核心能力爆發的關鍵時機。`},{icon:"🔮",t:"2026靈魂旅程",c:`${S.tarot[di]}是你本週的宇宙指引。上半年能量積累，下半年全面爆發，你的靈魂旅程已正式啟動。`}].map(s=>(
                  <div key={s.t} style={{background:"rgba(0,0,0,0.18)",borderRadius:10,padding:12,marginBottom:8}}>
                    <b style={{color:S.color,fontSize:14}}>{s.icon} {s.t}</b>

                  </div>

            )}

            <button onClick={()=>setPage("daily")} className="bh" style={B("linear-gradient(135deg,#F472B6,#8B7CF6)")}>🌙 進入我的每日靈語中心</button>
            <button onClick={()=>setPage("sub")} className="bh" style={B("rgba(255,255,255,0.05)",{border:"1px solid rgba(255,255,255,0.1)"})}>🌟 訂閱 · 天天都有新啟示</button>
            <button onClick={()=>setPage("home")} className="bh" style={B("rgba(255,255,255,0.07)",{border:"1px solid rgba(255,255,255,0.15)",marginBottom:40})}>← 返回首頁</button>
          </div>
        </div>
      </div>

  // ── DAILY CENTER ──────────────────────────────────────────────────────────────
  if(page==="daily" && S && ST) {
    const tabs=[{k:"daily",icon:"🌙",label:"今日靈語"},{k:"growth",icon:"🌱",label:"成長語錄"},{k:"tarot",icon:"🃏",label:"塔羅指引"},{k:"energy",icon:"⚡",label:"能量預報"}];
    return (
      <div style={{...base,background:`radial-gradient(ellipse at top,${S.glow}15 0%,#070510 55%)`}}><BG/>
        <div style={W}>
          <div style={{padding:"28px 0"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <button onClick={()=>setPage("home")} style={{background:"rgba(255,255,255,0.07)",border:"none",color:"white",padding:"6px 11px",borderRadius:10,cursor:"pointer",fontSize:14}}>←</button>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  每日靈語中心 <TypeChip type={mbtiType} st={subtype} size="sm"/>
                </div>
                <div style={{color:"rgba(255,255,255,0.3)",fontSize:13,marginTop:2}}>{getDateStr()} · 每日更新</div>
              </div>
            </div>

            {/* Tab bar */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:14,background:"rgba(255,255,255,0.04)",borderRadius:12,padding:4}}>
              {tabs.map(t=>(
                <button key={t.k} onClick={()=>setTab(t.k)} className="tab-btn" style={{padding:"10px 4px",background:tab===t.k?`${S.color}22`:"transparent",border:tab===t.k?`1px solid ${S.color}44`:"1px solid transparent",borderRadius:9,color:tab===t.k?S.color:"rgba(255,255,255,0.35)",fontSize:13,cursor:"pointer",fontWeight:tab===t.k?700:400,transition:"all 0.2s",minHeight:48}}>
                  <div style={{fontSize:17,marginBottom:2}}>{t.icon}</div>{t.label}
                </button>
              ))}

            </div>
            {plans.map((pl,i)=>(
              <div key={pl.n} className="gh" style={{...C(),border:pl.hot?`1px solid ${pl.c}44`:"1px solid rgba(255,255,255,0.07)",position:"relative",animation:`fu 0.5s ${i*0.08}s ease both`}}>
                {pl.hot&&<div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${pl.c},${pl.c}99)`,color:"white",padding:"2px 12px",borderRadius:16,fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>🔥 最多人選擇</div>}
